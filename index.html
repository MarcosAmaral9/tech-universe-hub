          if (t !== "light" && t !== "dark") t = "dark";
          var r = document.documentElement;
          r.classList.remove("light", "dark");
          r.classList.add(t);
          r.style.colorScheme = t;
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
